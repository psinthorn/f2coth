services:
  # ----------------------------------------------------------------
  # Edge / API Gateway
  # ----------------------------------------------------------------
  traefik:
    image: traefik:v2.11
    container_name: f2-traefik
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --log.level=INFO
    ports:
      - "${TRAEFIK_PORT:-80}:80"
      - "${TRAEFIK_DASHBOARD_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - f2-net

  # ----------------------------------------------------------------
  # Database
  # ----------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: f2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - f2-net

  # ----------------------------------------------------------------
  # Go microservices
  # ----------------------------------------------------------------
  cms-api:
    build:
      context: ./services/cms-api
      dockerfile: Dockerfile
    container_name: f2-cms-api
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: cms-api
      SERVICE_PORT: "8001"
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.cms.rule=PathPrefix(`/api/cms`)
      - traefik.http.routers.cms.entrypoints=web
      - traefik.http.services.cms.loadbalancer.server.port=8001
    networks:
      - f2-net

  checklist-api:
    build:
      context: ./services/checklist-api
      dockerfile: Dockerfile
    container_name: f2-checklist-api
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: checklist-api
      SERVICE_PORT: "8008"
      UPLOADS_DIR: /data/uploads
    volumes:
      - checklist-uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - traefik.enable=true
      # Two routers: staff (unlimited, matches /api/checklists) and portal
      # (rate-limited, matches only /api/checklists/portal). Traefik picks
      # the more specific rule first, so the portal one intercepts.
      - traefik.http.routers.checklist.rule=PathPrefix(`/api/checklists`)
      - traefik.http.routers.checklist.entrypoints=web
      - traefik.http.services.checklist.loadbalancer.server.port=8008
      - traefik.http.routers.checklist-portal.rule=PathPrefix(`/api/checklists/portal`)
      - traefik.http.routers.checklist-portal.entrypoints=web
      - traefik.http.routers.checklist-portal.service=checklist
      - traefik.http.routers.checklist-portal.priority=100
      - traefik.http.routers.checklist-portal.middlewares=checklist-portal-ratelimit
      # 30 req/s per source IP (bursts to 60). Matches the pattern used for
      # /api/leads and /api/consent — public-adjacent endpoints get a limit.
      - traefik.http.middlewares.checklist-portal-ratelimit.ratelimit.average=30
      - traefik.http.middlewares.checklist-portal-ratelimit.ratelimit.burst=60
      - traefik.http.middlewares.checklist-portal-ratelimit.ratelimit.period=1m
      # /api/checklists/uploads POST — tight limit so a misbehaving tech
      # can't fill the volume. 10 uploads/min per IP with burst 5. Applies
      # to the writer path only; GETs on stored files go through the
      # unlimited main router. Higher-priority so it wins over `checklist`.
      - traefik.http.routers.checklist-upload.rule=Path(`/api/checklists/uploads`)
      - traefik.http.routers.checklist-upload.entrypoints=web
      - traefik.http.routers.checklist-upload.service=checklist
      - traefik.http.routers.checklist-upload.priority=150
      - traefik.http.routers.checklist-upload.middlewares=checklist-upload-ratelimit
      - traefik.http.middlewares.checklist-upload-ratelimit.ratelimit.average=10
      - traefik.http.middlewares.checklist-upload-ratelimit.ratelimit.burst=5
      - traefik.http.middlewares.checklist-upload-ratelimit.ratelimit.period=1m
    networks:
      - f2-net

  lead-api:
    build:
      context: ./services/lead-api
      dockerfile: Dockerfile
    container_name: f2-lead-api
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: lead-api
      SERVICE_PORT: "8002"
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.lead.rule=PathPrefix(`/api/leads`)
      - traefik.http.routers.lead.entrypoints=web
      - traefik.http.routers.lead.middlewares=lead-ratelimit
      - traefik.http.middlewares.lead-ratelimit.ratelimit.average=30
      - traefik.http.middlewares.lead-ratelimit.ratelimit.burst=10
      - traefik.http.middlewares.lead-ratelimit.ratelimit.period=1m
      - traefik.http.services.lead.loadbalancer.server.port=8002
      # /api/consent — tighter limit (public DSR-adjacent endpoint)
      - traefik.http.routers.consent.rule=PathPrefix(`/api/consent`)
      - traefik.http.routers.consent.entrypoints=web
      - traefik.http.routers.consent.service=lead
      - traefik.http.routers.consent.middlewares=consent-ratelimit
      - traefik.http.middlewares.consent-ratelimit.ratelimit.average=5
      - traefik.http.middlewares.consent-ratelimit.ratelimit.burst=3
      - traefik.http.middlewares.consent-ratelimit.ratelimit.period=1m
    networks:
      - f2-net

  ai-chat-api:
    build:
      context: ./services/ai-chat-api
      dockerfile: Dockerfile
    container_name: f2-ai-chat-api
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: ai-chat-api
      SERVICE_PORT: "8003"
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.chat.rule=PathPrefix(`/api/chat`)
      - traefik.http.routers.chat.entrypoints=web
      - traefik.http.routers.chat.middlewares=chat-ratelimit
      - traefik.http.middlewares.chat-ratelimit.ratelimit.average=10
      - traefik.http.middlewares.chat-ratelimit.ratelimit.burst=5
      - traefik.http.middlewares.chat-ratelimit.ratelimit.period=1m
      - traefik.http.services.chat.loadbalancer.server.port=8003
    networks:
      - f2-net

  auth-api:
    build:
      context: ./services/auth-api
      dockerfile: Dockerfile
    container_name: f2-auth-api
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: auth-api
      SERVICE_PORT: "8004"
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.auth.rule=PathPrefix(`/api/auth`)
      - traefik.http.routers.auth.entrypoints=web
      - traefik.http.routers.auth.middlewares=auth-ratelimit
      - traefik.http.middlewares.auth-ratelimit.ratelimit.average=10
      - traefik.http.middlewares.auth-ratelimit.ratelimit.burst=5
      - traefik.http.middlewares.auth-ratelimit.ratelimit.period=1m
      - traefik.http.services.auth.loadbalancer.server.port=8004
      # /api/privacy — tighter limit for public DSR submit
      - traefik.http.routers.privacy.rule=PathPrefix(`/api/privacy`)
      - traefik.http.routers.privacy.entrypoints=web
      - traefik.http.routers.privacy.service=auth
      - traefik.http.routers.privacy.middlewares=privacy-ratelimit
      - traefik.http.middlewares.privacy-ratelimit.ratelimit.average=5
      - traefik.http.middlewares.privacy-ratelimit.ratelimit.burst=3
      - traefik.http.middlewares.privacy-ratelimit.ratelimit.period=1m
      # Password-reset endpoints — tighter still (5 attempts / min per IP)
      # so brute-force enumeration is impractical. Applies to both staff
      # (/api/auth/forgot-password + /reset-password) and customer variants
      # (/api/auth/customer/...) since both live under the same prefix.
      - traefik.http.routers.pwreset.rule=PathRegexp(`^/api/auth/(customer/)?(forgot|reset)-password$`)
      - traefik.http.routers.pwreset.entrypoints=web
      - traefik.http.routers.pwreset.service=auth
      - traefik.http.routers.pwreset.priority=200
      - traefik.http.routers.pwreset.middlewares=pwreset-ratelimit
      - traefik.http.middlewares.pwreset-ratelimit.ratelimit.average=5
      - traefik.http.middlewares.pwreset-ratelimit.ratelimit.burst=3
      - traefik.http.middlewares.pwreset-ratelimit.ratelimit.period=1m
    networks:
      - f2-net

  notification-api:
    build:
      context: ./services/notification-api
      dockerfile: Dockerfile
    container_name: f2-notification-api
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: notification-api
      SERVICE_PORT: "8005"
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.notify.rule=PathPrefix(`/api/notifications`)
      - traefik.http.routers.notify.entrypoints=web
      - traefik.http.services.notify.loadbalancer.server.port=8005
    networks:
      - f2-net

  customer-api:
    build:
      context: ./services/customer-api
      dockerfile: Dockerfile
    container_name: f2-customer-api
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: customer-api
      SERVICE_PORT: "8006"
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.portal.rule=PathPrefix(`/api/portal`) || PathPrefix(`/api/customer`)
      - traefik.http.routers.portal.entrypoints=web
      - traefik.http.services.portal.loadbalancer.server.port=8006
    networks:
      - f2-net

  reseller-api:
    build:
      context: ./services/reseller-api
      dockerfile: Dockerfile
    container_name: f2-reseller-api
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: reseller-api
      SERVICE_PORT: "8007"
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.reseller.rule=PathPrefix(`/api/reseller`)
      - traefik.http.routers.reseller.entrypoints=web
      - traefik.http.services.reseller.loadbalancer.server.port=8007
    networks:
      - f2-net

  payment-api:
    build:
      context: ./services/payment-api
      dockerfile: Dockerfile
    container_name: f2-payment-api
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: payment-api
      SERVICE_PORT: "8008"
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.payment.rule=PathPrefix(`/api/payment`)
      - traefik.http.routers.payment.entrypoints=web
      - traefik.http.routers.payment.middlewares=payment-ratelimit
      # 60 req/min average with burst 20 — generous for normal admin/portal
      # use while still blunting any abuse on the public webhook + status
      # endpoints. /api/payment/webhooks/paypal traffic from PayPal itself
      # stays well below this.
      - traefik.http.middlewares.payment-ratelimit.ratelimit.average=60
      - traefik.http.middlewares.payment-ratelimit.ratelimit.burst=20
      - traefik.http.middlewares.payment-ratelimit.ratelimit.period=1m
      - traefik.http.services.payment.loadbalancer.server.port=8008
    networks:
      - f2-net

  # ----------------------------------------------------------------
  # Next.js frontend
  # ----------------------------------------------------------------
  web-app:
    build:
      context: ./services/web-app
      dockerfile: Dockerfile
    container_name: f2-web-app
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    depends_on:
      - cms-api
      - lead-api
      - ai-chat-api
    labels:
      - traefik.enable=true
      - traefik.http.routers.web.rule=PathPrefix(`/`)
      - traefik.http.routers.web.entrypoints=web
      - traefik.http.routers.web.priority=1
      - traefik.http.services.web.loadbalancer.server.port=3000
    networks:
      - f2-net

  # AI Orchestrator — provider-agnostic router that dispatches each task
  # (orchestrator, content_writer, ticket_triage, ...) to Anthropic cloud
  # or local Ollama based on the ai_routing table (migration 050).
  # Ollama runs on the host Mac (Metal-accelerated) per the pilot MVP
  # decision — reached via host.docker.internal:11434.
  ai-orchestrator-api:
    build:
      context: ./services/ai-orchestrator-api
      dockerfile: Dockerfile
    container_name: f2-ai-orchestrator-api
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: ai-orchestrator-api
      SERVICE_PORT: "8009"
      # Local Ollama on the host — override in .env if running elsewhere.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      # Monthly USD cap that triggers the /admin/ai budget-alert email.
      AI_BUDGET_ALERT_USD: ${AI_BUDGET_ALERT_USD:-150}
    extra_hosts:
      # Linux Docker doesn't auto-map host.docker.internal — this line is
      # a no-op on macOS but keeps the service portable to a Linux host.
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.ai.rule=PathPrefix(`/api/ai`)
      - traefik.http.routers.ai.entrypoints=web
      - traefik.http.routers.ai.middlewares=ai-ratelimit
      - traefik.http.middlewares.ai-ratelimit.ratelimit.average=30
      - traefik.http.middlewares.ai-ratelimit.ratelimit.burst=10
      - traefik.http.middlewares.ai-ratelimit.ratelimit.period=1m
      - traefik.http.services.ai.loadbalancer.server.port=8009
    networks:
      - f2-net

  # Internal document generator (docx + PDF) for contract-api. NOT exposed via
  # Traefik — reachable only on f2-net at http://docgen:8080.
  docgen:
    build:
      context: ./services/docgen
      dockerfile: Dockerfile
    container_name: f2-docgen
    restart: unless-stopped
    environment:
      SERVICE_NAME: docgen
      SERVICE_PORT: "8080"
    networks:
      - f2-net

  contract-api:
    build:
      context: ./services/contract-api
      dockerfile: Dockerfile
    container_name: f2-contract-api
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: contract-api
      SERVICE_PORT: "8008"
      UPLOADS_DIR: /data/uploads
      DOCGEN_URL: http://docgen:8080
    volumes:
      - contract-uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      docgen:
        condition: service_started
    labels:
      - traefik.enable=true
      - traefik.http.routers.contract.rule=PathPrefix(`/api/contracts`)
      - traefik.http.routers.contract.entrypoints=web
      - traefik.http.services.contract.loadbalancer.server.port=8008
      # Signed-scan upload (POST /api/contracts/{id}/files) — tight limit so a
      # misbehaving client can't fill the volume. 10 uploads/min per IP,
      # burst 5. Higher priority so it wins over the main `contract` router.
      - traefik.http.routers.contract-upload.rule=PathRegexp(`^/api/contracts/[^/]+/files$`)
      - traefik.http.routers.contract-upload.entrypoints=web
      - traefik.http.routers.contract-upload.service=contract
      - traefik.http.routers.contract-upload.priority=150
      - traefik.http.routers.contract-upload.middlewares=contract-upload-ratelimit
      - traefik.http.middlewares.contract-upload-ratelimit.ratelimit.average=10
      - traefik.http.middlewares.contract-upload-ratelimit.ratelimit.burst=5
      - traefik.http.middlewares.contract-upload-ratelimit.ratelimit.period=1m
    networks:
      - f2-net

networks:
  f2-net:
    driver: bridge

volumes:
  pgdata:
    driver: local
  checklist-uploads:
    driver: local
  contract-uploads:
    driver: local
