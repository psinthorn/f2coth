name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────
  # Go services — build + vet + test (matrix, parallel)
  # ──────────────────────────────────────────────────────────
  go:
    name: Go — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - ai-chat-api
          - assethub-api
          - auth-api
          - checklist-api
          - cms-api
          - contract-api
          - customer-api
          - lead-api
          - notification-api
          - payment-api
          - reseller-api

    # Postgres side-car for services that ship DB-backed integration
    # tests (payment-api's lookup_contact_test.go, etc). Tests are gated
    # on TEST_DATABASE_URL — services that don't opt in ignore it.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: f2
          POSTGRES_PASSWORD: f2_ci_password
          POSTGRES_DB: f2_website
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U f2"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/${{ matrix.service }}/go.mod
          cache-dependency-path: services/${{ matrix.service }}/go.sum

      - name: Install psql client
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Apply DB migrations (for integration tests)
        env:
          PGPASSWORD: f2_ci_password
        run: |
          for f in $(ls database/migrations/*.sql | sort); do
            echo ">>> applying $(basename $f)"
            # Some migrations are idempotent + hit "already exists" NOTICEs
            # on re-run; that is not a failure. Only stop on real SQL errors
            # by piping stderr through a grep that filters out NOTICE lines.
            psql -h localhost -U f2 -d f2_website -q -f "$f" 2>&1 \
              | grep -Ev '^NOTICE:' || true
          done

      - name: go mod tidy (no drift)
        working-directory: services/${{ matrix.service }}
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || \
            (echo "::error::go.mod/go.sum out of sync — run 'make tidy' and commit" && exit 1)

      - name: go vet
        working-directory: services/${{ matrix.service }}
        run: go vet ./...

      - name: go test (unit + regression + integration when opted-in via TEST_DATABASE_URL)
        working-directory: services/${{ matrix.service }}
        env:
          TEST_DATABASE_URL: postgres://f2:f2_ci_password@localhost:5432/f2_website
        run: go test -race -timeout 120s ./...

      - name: govulncheck
        working-directory: services/${{ matrix.service }}
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # ──────────────────────────────────────────────────────────
  # Next.js — type-check + lint + i18n parity + build
  # ──────────────────────────────────────────────────────────
  web:
    name: Web App
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: services/web-app/.nvmrc
          cache: npm
          cache-dependency-path: services/web-app/package-lock.json

      - name: Install dependencies
        working-directory: services/web-app
        run: npm ci

      - name: Type check
        working-directory: services/web-app
        run: npm run type-check

      - name: Lint
        working-directory: services/web-app
        run: npm run lint

      - name: i18n key parity (EN ↔ TH)
        working-directory: services/web-app
        run: npm run i18n-check

      - name: Build
        working-directory: services/web-app
        env:
          # Provide dummy public vars so next build doesn't error on missing envs
          NEXT_PUBLIC_API_BASE: /api
        run: npm run build

      - name: npm audit
        working-directory: services/web-app
        run: npm audit --audit-level=high
